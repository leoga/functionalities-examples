version: '3.8'

services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev
    ports:
      - "127.0.0.1:8443:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    restart: unless-stopped
    volumes:
      - keycloak-data:/opt/keycloak/data

volumes:
  keycloak-data: